<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<script>
// Redirige /MapHalo/ROWID vers /MapHalo/?rowid=ROWID
// GitHub Pages sert ce fichier pour toute URL inconnue
const path = window.location.pathname;
const parts = path.replace(/\/+$/, '').split('/');
const last = parts[parts.length - 1];
if(last && last !== 'MapHalo'){
  window.location.replace('/MapHalos/?rowid=' + encodeURIComponent(last));
} else {
  window.location.replace('/MapHalo/');
}
</script>
</head>
<body></body>
</html>
